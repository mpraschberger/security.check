<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sicherheits-Demo – Fake Google Login</title>

<style>
body {
    font-family: Arial, Helvetica, sans-serif;
    background-color: #f1f3f4;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.login-container {
    background-color: #ffffff;
    width: 360px;
    padding: 40px 35px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    text-align: center;
}

.logo-container {
    margin-bottom: 25px;
}

.logo-icon {
    width: 72px;
    height: 72px;
    margin-bottom: 12px;
}

/* Google‑ähnlicher, aber eigener Text */
.logo-text {
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.3px;
}

.logo-text span:nth-child(1) { color: #4285f4; }
.logo-text span:nth-child(2) { color: #ea4335; }
.logo-text span:nth-child(3) { color: #fbbc05; }
.logo-text span:nth-child(4) { color: #34a853; }

.subtitle {
    font-size: 14px;
    color: #5f6368;
    margin: 15px 0 25px;
}

input {
    width: 100%;
    padding: 12px;
    font-size: 14px;
    margin-bottom: 12px;
    border-radius: 6px;
    border: 1px solid #dadce0;
}

input:focus {
    outline: none;
    border-color: #4285f4;
}

button {
    width: 100%;
    background-color: #1a73e8;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 6px;
    font-weight: 600;
    cursor: pointer;
}

button:hover {
    background-color: #1558b0;
}

.demo-note {
    font-size: 11px;
    color: #999;
    margin-top: 25px;
}

/* PHISHING WARNUNG */
.warning-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.warning-box {
    background: #d93025;
    color: white;
    padding: 35px;
    border-radius: 14px;
    max-width: 420px;
    text-align: center;
}

.warning-box h1 {
    margin-top: 0;
}

.warning-box ul {
    text-align: left;
    display: inline-block;
    margin-top: 15px;
}

.warning-box button {
    margin-top: 20px;
    background: white;
    color: #d93025;
}
</style>
</head>

<body>

<div class="login-container">
    <div class="logo-container">
        <!-- Google‑ähnliches SVG‑Icon -->
        <svg class="logo-icon" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
            <circle cx="60" cy="60" r="52" fill="#ffffff" stroke="#e0e0e0" stroke-width="4"/>

            <path d="M60 12 A48 48 0 0 1 108 60"
                  stroke="#4285f4" stroke-width="10" fill="none" stroke-linecap="round"/>
            <path d="M108 60 A48 48 0 0 1 60 108"
                  stroke="#34a853" stroke-width="10" fill="none" stroke-linecap="round"/>
            <path d="M60 108 A48 48 0 0 1 12 60"
                  stroke="#fbbc05" stroke-width="10" fill="none" stroke-linecap="round"/>
            <path d="M12 60 A48 48 0 0 1 60 12"
                  stroke="#ea4335" stroke-width="10" fill="none" stroke-linecap="round"/>

            <!-- Verifikations-Haken -->
            <path d="M40 62 L54 76 L82 44"
                  fill="none" stroke="#444" stroke-width="8"
                  stroke-linecap="round" stroke-linejoin="round"/>
        </svg>

        <div class="logo-text">
            <span>S</span><span>e</span><span>a</span><span>rchVerify</span>
        </div>
    </div>

    <div class="subtitle">
        Konto verifizieren, um vollen Zugriff zu behalten
    </div>

    <form id="loginForm">
        <input type="text" id="user" placeholder="E-Mail oder Telefonnummer" required>
        <input type="password" id="pass" placeholder="Passwort" required>
        <button type="submit">Weiter</button>
    </form>



<!-- WARNUNG -->
